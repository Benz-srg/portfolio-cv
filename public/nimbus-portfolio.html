<style>
/* ── Nimbus tokens ─────────────────────────────────────────────────────── */
:root {
  --sky-top: #e0f2fe;
  --sky-mid: #ddd6fe;
  --sky-bot: #fce7f3;
  --sky: linear-gradient(180deg, var(--sky-top) 0%, var(--sky-mid) 55%, var(--sky-bot) 100%);

  --blue-50: #f0f9ff; --blue-100: #e0f2fe; --blue-200: #bae6fd;
  --blue-300: #7dd3fc; --blue-400: #38bdf8; --blue-500: #0ea5e9;
  --lav-50: #faf5ff; --lav-100: #f3e8ff; --lav-200: #e9d5ff;
  --lav-300: #c4b5fd; --lav-400: #a78bfa; --lav-500: #8b5cf6;
  --cyan-100: #cffafe; --cyan-200: #a5f3fc; --cyan-300: #67e8f9;
  --pink-100: #fce7f3; --pink-200: #fbcfe8;
  --mint-100: #d1fae5; --mint-200: #a7f3d0; --mint-400: #34d399;
  --peach-100: #ffedd5; --peach-200: #fed7aa; --peach-300: #fdba74;

  --cloud: rgba(255,255,255,0.82);
  --cloud-soft: rgba(255,255,255,0.62);
  --cloud-strong: rgba(255,255,255,0.94);
  --cloud-edge: rgba(255,255,255,0.65);
  --cloud-shadow: 0 18px 60px -24px rgba(99,102,241,0.28),
                  0 6px 18px -12px rgba(56,189,248,0.18),
                  0 1px 2px rgba(0,0,0,0.04);
  --cloud-shadow-soft: 0 10px 40px -20px rgba(99,102,241,0.22),
                       0 2px 8px -4px rgba(0,0,0,0.04);
  --cloud-shadow-strong: 0 28px 90px -30px rgba(99,102,241,0.40),
                         0 12px 30px -16px rgba(56,189,248,0.22);
  --inner-light: inset 0 1px 0 rgba(255,255,255,0.9);

  --brand-1: #7dd3fc;
  --brand-2: #a78bfa;
  --brand-grad: linear-gradient(135deg, var(--brand-1), var(--brand-2));
  --brand-grad-soft: linear-gradient(135deg, rgba(125,211,252,.18), rgba(167,139,250,.18));

  --ink-900: #1e1b4b; --ink-800: #312e81; --ink-700: #4338ca;
  --ink-600: #4f46e5; --ink-500: #6366f1; --ink-400: #818cf8;
  --slate-900: #0f172a; --slate-700: #334155; --slate-600: #475569;
  --slate-500: #64748b; --slate-400: #94a3b8; --slate-300: #cbd5e1;
  --slate-200: #e2e8f0; --slate-100: #f1f5f9;

  --text-strong: #1e1b4b;
  --text-body: #334155;
  --text-soft: #64748b;
  --text-faint: #94a3b8;

  --accent: var(--lav-400);
  --accent-soft: var(--lav-100);
  --positive: var(--mint-400);
  --positive-soft: var(--mint-100);
  --warm: var(--peach-300);
  --warm-soft: var(--peach-100);

  --font-sans: "Manrope", ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
  --font-display: "Plus Jakarta Sans", "Manrope", ui-sans-serif, system-ui, sans-serif;
  --font-mono: ui-monospace, "SFMono-Regular", Consolas, monospace;

  --t-display: clamp(40px,5vw,64px); --t-h1: clamp(28px,3.4vw,44px);
  --t-h2: clamp(22px,2.4vw,30px);   --t-h3: 20px; --t-h4: 17px;
  --t-body: 16px; --t-body-sm: 14px; --t-cap: 13px; --t-mono: 13px;

  --lh-tight: 1.1; --lh-snug: 1.25; --lh-base: 1.55; --lh-relaxed: 1.7;
  --w-regular: 400; --w-medium: 500; --w-semibold: 600;
  --w-bold: 700; --w-black: 800;

  --s-1: 4px; --s-2: 8px; --s-3: 12px; --s-4: 16px; --s-5: 20px;
  --s-6: 24px; --s-7: 28px; --s-8: 32px; --s-10: 40px;
  --s-12: 48px; --s-14: 56px; --s-16: 64px;

  --r-1: 8px; --r-2: 14px; --r-3: 20px; --r-4: 26px; --r-5: 32px;

  --ease-soft: cubic-bezier(0.22,0.61,0.36,1);
  --ease-float: cubic-bezier(0.45,0,0.55,1);
  --ease-pop: cubic-bezier(0.34,1.4,0.64,1);
  --dur-fast: 180ms; --dur-base: 320ms;
  --dur-medium: 520ms; --dur-slow: 900ms;
  --motion-scale: 1;
}

.night {
  --sky: linear-gradient(180deg,#0f0e2e 0%,#1e1b4b 45%,#312e81 100%);
  --cloud: rgba(49,46,129,0.62);

  --cloud-strong: rgba(67,56,202,0.74);
  --cloud-edge: rgba(196,181,253,0.18);
  --cloud-shadow: 0 18px 60px -24px rgba(15,23,42,0.55),
                  0 6px 18px -12px rgba(67,56,202,0.35),

  --cloud-shadow-soft: 0 10px 40px -20px rgba(15,23,42,0.45);
  --cloud-shadow-strong: 0 28px 90px -30px rgba(15,23,42,0.65),
                         0 12px 30px -16px rgba(67,56,202,0.45);
  --inner-light: inset 0 1px 0 rgba(196,181,253,0.18);
  --text-strong: #f5f3ff;
  --text-body: #ddd6fe;
  --text-soft: #a5b4fc;
  --text-faint: #6366f1;
}

.palette-skyblue  { --brand-1:#7dd3fc; --brand-2:#a78bfa; }
.palette-lavender { --sky-top:#fce7f3; --sky-mid:#ddd6fe; --sky-bot:#c7d2fe; --brand-1:#c4b5fd; --brand-2:#f9a8d4; }
.palette-mint     { --sky-top:#ecfeff; --sky-mid:#d1fae5; --sky-bot:#e0f2fe; --brand-1:#5eead4; --brand-2:#7dd3fc; }
.palette-sunset   { --sky-top:#fef3c7; --sky-mid:#fbcfe8; --sky-bot:#ddd6fe; --brand-1:#fbbf24; --brand-2:#f472b6; }

/* ── Reset & base ──────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; }
html, body { margin: 0; padding: 0; min-height: 100%; }
body { background: var(--sky); }

/* ── Nimbus root ───────────────────────────────────────────────────────── */
.nimbus-root {
  font-family: var(--font-sans);
  color: var(--text-body);
  font-size: var(--t-body);
  line-height: var(--lh-base);
  background: var(--sky);
  position: relative;
  width: 100%;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  isolation: isolate;
}
.nimbus-root > * { position: relative; z-index: 1; }

/* ── Cloud backdrop ────────────────────────────────────────────────────── */
.cloud-layer {
  position: fixed; inset: 0;
  pointer-events: none; overflow: hidden; z-index: 0;
}
.cloud-layer svg.cloud {
  position: absolute; filter: blur(0.5px); opacity: 0.85; will-change: transform;
}
.night .cloud-layer svg.cloud { opacity: 0.55; }
.night .cloud-layer svg.cloud path,
.night .cloud-layer svg.cloud ellipse { fill: rgba(196,181,253,0.45); }

@keyframes drift-right { from { transform: translateX(-15vw); } to { transform: translateX(115vw); } }
@keyframes drift-left  { from { transform: translateX(115vw); } to { transform: translateX(-15vw); } }
@keyframes float-y     { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
@keyframes twinkle     { 0%,100% { opacity: 0.2; } 50% { opacity: 1; } }

.cloud-layer .star {
  position: absolute; width: 3px; height: 3px; border-radius: 50%;
  background: white; box-shadow: 0 0 6px rgba(255,255,255,0.8);
  animation: twinkle calc(3s / var(--motion-scale,1)) ease-in-out infinite;
  opacity: 0; display: none;
}
.night .cloud-layer .star { display: block; }

/* ── Cloud card ────────────────────────────────────────────────────────── */
.cloud-card {
  background: var(--cloud);
  backdrop-filter: blur(20px) saturate(140%);
  -webkit-backdrop-filter: blur(20px) saturate(140%);
  border: 1px solid var(--cloud-edge);
  border-radius: var(--r-4);
  box-shadow: var(--cloud-shadow), var(--inner-light);
  padding: var(--s-6);
  transition: transform var(--dur-base) var(--ease-soft),
              box-shadow var(--dur-base) var(--ease-soft);
}
.cloud-card.is-hoverable:hover {
  transform: translateY(calc(-3px * var(--motion-scale,1)));
  box-shadow: var(--cloud-shadow-strong), var(--inner-light);
}
.cloud-card.is-soft   { background: var(--cloud-soft); box-shadow: var(--cloud-shadow-soft), var(--inner-light); }
.cloud-card.is-strong { background: var(--cloud-strong); }

/* ── Buttons ───────────────────────────────────────────────────────────── */
.btn {
  display: inline-flex; align-items: center; justify-content: center;
  gap: var(--s-2); font-family: inherit; font-size: 15px;
  font-weight: var(--w-semibold); line-height: 1;
  border: none; cursor: pointer; border-radius: var(--r-pill);
  padding: 14px 24px; text-decoration: none;
  transition: transform var(--dur-base) var(--ease-pop),
              box-shadow var(--dur-base) var(--ease-soft),
              filter var(--dur-base) var(--ease-soft);
  white-space: nowrap;
}
.btn-primary {
  background: var(--brand-grad); color: white;
  box-shadow: 0 10px 30px -10px rgba(125,211,252,0.65),
              0 4px 10px -4px rgba(167,139,250,0.4),
              inset 0 1px 0 rgba(255,255,255,0.45);
}
.btn-primary:hover { transform: translateY(calc(-2px * var(--motion-scale,1))); filter: brightness(1.05); }
.btn-soft {
  background: var(--cloud-strong); color: var(--text-strong);
  box-shadow: 0 6px 18px -8px rgba(99,102,241,0.25), var(--inner-light);
}
.btn-soft:hover { transform: translateY(calc(-1px * var(--motion-scale,1))); }
.btn-ghost { background: transparent; color: var(--text-body); padding: 10px 16px; }
.btn-ghost:hover { background: var(--cloud-soft); }

/* ── Chip ──────────────────────────────────────────────────────────────── */
.chip {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--cloud-soft); border: 1px solid var(--cloud-edge);
  color: var(--text-body); font-size: 13px; font-weight: var(--w-medium);
  padding: 6px 12px; border-radius: var(--r-pill);
  backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
}
.chip.is-accent   { background: var(--brand-grad-soft); color: var(--ink-700); }
.chip.is-positive { background: var(--positive-soft); color: #047857; }
.night .chip.is-accent { color: var(--lav-200); }

/* ── Type ──────────────────────────────────────────────────────────────── */
.eyebrow {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 12px; font-weight: var(--w-semibold);
  letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-soft);
}
.h-display { font-family: var(--font-display); font-size: var(--t-display); font-weight: var(--w-bold); line-height: var(--lh-tight); color: var(--text-strong); letter-spacing: -0.025em; margin: 0; }
.h1 { font-family: var(--font-display); font-size: var(--t-h1); font-weight: var(--w-bold); line-height: var(--lh-snug); color: var(--text-strong); letter-spacing: -0.02em; margin: 0; }
.h2 { font-family: var(--font-display); font-size: var(--t-h2); font-weight: var(--w-bold); line-height: var(--lh-snug); color: var(--text-strong); letter-spacing: -0.015em; margin: 0; }
.h3 { font-size: var(--t-h3); font-weight: var(--w-bold); color: var(--text-strong); letter-spacing: -0.01em; margin: 0; }
.h4 { font-size: var(--t-h4); font-weight: var(--w-semibold); color: var(--text-strong); margin: 0; }
.muted { color: var(--text-soft); }
.faint { color: var(--text-faint); }

/* ── Float ─────────────────────────────────────────────────────────────── */
.float { animation: float-y calc(6s / var(--motion-scale,1)) var(--ease-float) infinite; will-change: transform; }
.float--delay-1 { animation-delay: 0.6s; }
.float--delay-2 { animation-delay: 1.2s; }

/* ── Responsive ────────────────────────────────────────────────────────── */
@media (max-width: 860px) {
  .bento-grid { grid-template-columns: 1fr !important; }
  .bento-main { grid-column: span 1 !important; grid-row: span 1 !important; }
  .bento-side { grid-column: span 1 !important; grid-row: span 1 !important; }
  .work-grid  { grid-template-columns: 1fr !important; }
  .exp-grid   { grid-template-columns: 1fr !important; }
  .skills-contact { grid-template-columns: 1fr !important; }
  .now-grid   { grid-template-columns: 1fr !important; }
}
</style>

<script type="text/babel">
const { useEffect, useRef, useState } = React;

const _GITHUB_PATH = "M12 0C5.37 0 0 5.37 0 12c0 5.3 3.44 9.8 8.21 11.39.6.11.82-.26.82-.58 0-.29-.01-1.05-.02-2.06-3.34.73-4.04-1.61-4.04-1.61-.55-1.39-1.34-1.76-1.34-1.76-1.09-.74.08-.73.08-.73 1.2.08 1.84 1.24 1.84 1.24 1.07 1.84 2.81 1.31 3.5 1 .11-.78.42-1.31.76-1.61-2.66-.3-5.47-1.33-5.47-5.93 0-1.31.47-2.38 1.24-3.22-.12-.3-.54-1.52.12-3.17 0 0 1.01-.32 3.3 1.23a11.5 11.5 0 016.01 0c2.29-1.55 3.3-1.23 3.3-1.23.66 1.65.24 2.87.12 3.17.77.84 1.24 1.91 1.24 3.22 0 4.61-2.81 5.63-5.49 5.93.43.37.81 1.1.81 2.22 0 1.61-.01 2.9-.01 3.29 0 .32.22.7.83.58A12.001 12.001 0 0024 12c0-6.63-5.37-12-12-12z";

function Icon({ name, size = 20, color, strokeWidth = 2, style }) {
  if (name === "github") {
    return (
      <svg viewBox="0 0 24 24" width={size} height={size} fill={color || "currentColor"} style={{ display:"inline-flex", flexShrink:0, ...style }} aria-hidden>
        <path d={_GITHUB_PATH} />
      </svg>
    );
  }
  return React.createElement("i", {
    "data-lucide": name,
    style: { width:size, height:size, color, strokeWidth, display:"inline-flex", flexShrink:0, ...style },
  });
}

function CloudPuff({ scale = 1, opacity = 0.85, tint }) {
  const fill = tint || "#ffffff";
  return (
    <svg className="cloud" viewBox="0 0 240 100" width={240*scale} height={100*scale} style={{ opacity }}>
      <ellipse cx="60"  cy="60" rx="40" ry="28" fill={fill} />
      <ellipse cx="110" cy="50" rx="50" ry="34" fill={fill} />
      <ellipse cx="170" cy="58" rx="42" ry="28" fill={fill} />
      <ellipse cx="200" cy="68" rx="32" ry="22" fill={fill} />
      <ellipse cx="90"  cy="74" rx="38" ry="20" fill={fill} />
    </svg>
  );
}
function CloudWisp({ scale = 0.6, opacity = 0.55 }) {
  return (
    <svg className="cloud" viewBox="0 0 240 60" width={240*scale} height={60*scale} style={{ opacity }}>
      <ellipse cx="60"  cy="34" rx="50" ry="14" fill="#ffffff" />
      <ellipse cx="160" cy="30" rx="70" ry="16" fill="#ffffff" />
    </svg>
  );
}

function CloudBackdrop({ intensity = 1 }) {
  const motionDur = (s) => `calc(${s}s / max(var(--motion-scale, 1), 0.001))`;
  const clouds = [
    { top:"8%",  dir:"right", dur:80,  scale:1.2, opacity:0.85, kind:"puff" },
    { top:"26%", dir:"left",  dur:130, scale:0.7, opacity:0.5,  kind:"wisp" },
    { top:"42%", dir:"right", dur:110, scale:0.9, opacity:0.6,  kind:"puff" },
    { top:"62%", dir:"left",  dur:95,  scale:1.1, opacity:0.75, kind:"puff" },
    { top:"78%", dir:"right", dur:140, scale:0.6, opacity:0.45, kind:"wisp" },
  ];
  return (
    <div className="cloud-layer" aria-hidden>
      {clouds.map((c, i) => (
        <div key={i} style={{ position:"absolute", top:c.top, left:0,
          animation:`drift-${c.dir} ${motionDur(c.dur)} linear infinite`,
          animationDelay:`${-i*14}s`, opacity:intensity===0?0:1 }}>
          {c.kind==="puff" ? <CloudPuff scale={c.scale} opacity={c.opacity} /> : <CloudWisp scale={c.scale} opacity={c.opacity} />}
        </div>
      ))}
      {Array.from({ length: 30 }).map((_, i) => {
        const x = (i*53)%100, y = (i*37)%60;
        const sz = 1.5+(i%4)*0.6, delay = (i*0.31)%4;
        return <span key={`s${i}`} className="star" style={{ left:`${x}%`, top:`${y}%`, width:sz, height:sz, animationDelay:`${delay}s` }} />;
      })}
    </div>
  );
}

function CloudCard({ children, hoverable, soft, strong, style, className="", ...rest }) {
  let cls = "cloud-card";
  if (hoverable) cls += " is-hoverable";
  if (soft)      cls += " is-soft";
  if (strong)    cls += " is-strong";
  if (className) cls += " " + className;
  return <div className={cls} style={style} {...rest}>{children}</div>;
}

function Cumulus({ size = 80, mood = "happy" }) {
  return (
    <svg viewBox="0 0 120 100" width={size} height={size*100/120} aria-label="Cumulus cloud mascot">
      <defs>
        <linearGradient id="cm-body" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"   stopColor="#ffffff" />
          <stop offset="100%" stopColor="#e0f2fe" />
        </linearGradient>
        <radialGradient id="cm-blush" cx="50%" cy="50%" r="50%">
          <stop offset="0%"   stopColor="#fbcfe8" stopOpacity="0.85" />
          <stop offset="100%" stopColor="#fbcfe8" stopOpacity="0" />
        </radialGradient>
      </defs>
      <ellipse cx="35" cy="62" rx="28" ry="22" fill="url(#cm-body)" />
      <ellipse cx="65" cy="50" rx="36" ry="28" fill="url(#cm-body)" />
      <ellipse cx="92" cy="62" rx="22" ry="18" fill="url(#cm-body)" />
      <ellipse cx="60" cy="78" rx="40" ry="16" fill="url(#cm-body)" />
      <circle cx="50" cy="56" r="3.5" fill="#1e1b4b" />
      <circle cx="74" cy="56" r="3.5" fill="#1e1b4b" />
      <path d={mood==="happy" ? "M 54 66 Q 62 72 70 66" : "M 54 66 L 70 66"} stroke="#1e1b4b" strokeWidth="2.5" fill="none" strokeLinecap="round" />
      <ellipse cx="44" cy="64" rx="6" ry="3.5" fill="url(#cm-blush)" />
      <ellipse cx="80" cy="64" rx="6" ry="3.5" fill="url(#cm-blush)" />
    </svg>
  );
}

Object.assign(window, { Icon, CloudPuff, CloudWisp, CloudBackdrop, CloudCard, Cumulus });
</script>

<script type="text/babel">
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === "object" && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
  }, []);
  return [values, setTweak];
}

    color:rgba(41,38,27,.45);padding:10px 0 0}
  .twk-seg{position:relative;display:flex;padding:2px;border-radius:8px;
    background:rgba(0,0,0,.06);user-select:none}
  .twk-seg-thumb{position:absolute;top:2px;bottom:2px;border-radius:6px;
    background:rgba(255,255,255,.9);box-shadow:0 1px 2px rgba(0,0,0,.12);
    transition:left .15s cubic-bezier(.3,.7,.4,1),width .15s}
  .twk-seg button{appearance:none;position:relative;z-index:1;flex:1;border:0;
    background:transparent;color:inherit;font:inherit;font-weight:500;min-height:22px;
    border-radius:6px;cursor:pointer;padding:4px 6px}
  .twk-slider{appearance:none;width:100%;height:4px;margin:6px 0;border-radius:999px;
    background:rgba(0,0,0,.12);outline:none}
  .twk-slider::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;
    border-radius:50%;background:#fff;border:.5px solid rgba(0,0,0,.12);
    box-shadow:0 1px 3px rgba(0,0,0,.2);cursor:pointer}
`;

function TweaksPanel({ title="Tweaks", children }) {
  const [open, setOpen] = React.useState(true);
  if (!open) return (
    <button onClick={() => setOpen(true)} style={{ position:"fixed", right:16, bottom:16, zIndex:9999,
      background:"var(--brand-grad)", color:"white", border:"none", borderRadius:"999px",
      padding:"10px 18px", cursor:"pointer", fontSize:13, fontWeight:600, boxShadow:"0 4px 14px rgba(125,211,252,0.5)" }}>
      Tweaks
    </button>
  );
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div className="twk-panel">
        <div className="twk-hd">
          <b>{title}</b>
          <button className="twk-x" onClick={() => setOpen(false)}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

function TweakSection({ label }) { return <div className="twk-sect">{label}</div>; }

function TweakRadio({ label, value, options, onChange }) {
  const opts = options.map((o) => (typeof o === "object" ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;
  const trackRef = React.useRef(null);
  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n-1, i))].value;
  };
  return (
    <div className="twk-row">
      <div className="twk-lbl"><span>{label}</span></div>
      <div ref={trackRef} className="twk-seg" onPointerDown={(e) => { const v = segAt(e.clientX); if (v !== value) onChange(v); }}>
        <div className="twk-seg-thumb" style={{ left:`calc(2px + ${idx}*(100% - 4px)/${n})`, width:`calc((100% - 4px)/${n})` }} />
        {opts.map((o) => <button key={o.value} type="button" onClick={() => onChange(o.value)}>{o.label}</button>)}
      </div>
    </div>
  );
}

function TweakSlider({ label, value, min=0, max=100, step=1, unit="", onChange }) {
  return (
    <div className="twk-row">
      <div className="twk-lbl"><span>{label}</span><span style={{ color:"rgba(41,38,27,.5)" }}>{value}{unit}</span></div>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </div>
  );
}

Object.assign(window, { useTweaks, TweaksPanel, TweakSection, TweakRadio, TweakSlider });
</script>

<script type="text/babel">
const TWEAK_DEFAULTS = {
  "theme":   "day",
  "palette": "skyblue",
  "motionScale": 1
};

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  React.useEffect(() => {
    const r = document.documentElement;
    r.classList.toggle("night", t.theme === "night");
    ["skyblue", "lavender", "mint", "sunset"].forEach(p => r.classList.toggle(`palette-${p}`, t.palette === p));
    r.style.setProperty("--motion-scale", String(t.motionScale));
  }, [t.theme, t.palette, t.motionScale]);

  return (
    <>
      <Portfolio />
      <TweaksPanel title="Tweaks · Portfolio">
        <TweakSection label="Theme" />
        <TweakRadio label="Day / Night" value={t.theme} options={["day", "night"]}
                    onChange={(v) => setTweak("theme", v)} />
        <TweakSection label="Palette" />
        <TweakRadio label="Sky · Lavender · Mint · Sunset" value={t.palette}
                    options={["skyblue", "lavender", "mint", "sunset"]}
                    onChange={(v) => setTweak("palette", v)} />
        <TweakSection label="Motion" />
        <TweakSlider label="Animation intensity" value={t.motionScale}
                     min={0} max={1.5} step={0.1}
                     onChange={(v) => setTweak("motionScale", v)} />
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

function refreshIcons() { if (window.lucide?.createIcons) window.lucide.createIcons(); }
requestAnimationFrame(() => requestAnimationFrame(refreshIcons));
setTimeout(refreshIcons, 250);
setTimeout(refreshIcons, 700);
document.addEventListener("click", () => setTimeout(refreshIcons, 0), true);
</script>
